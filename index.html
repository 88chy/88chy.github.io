<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大卫·霍克尼 | 作品集</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
background: #FFFFFF;
color: #111111;
}

/* 顶部名字 */
.top-name {
padding: 22px 20px 10px;
font-size: 24px;
font-weight: 700;
letter-spacing: -0.2px;
}

/* Tab 导航 */
.tab-bar {
display: flex;
padding: 0 20px 12px;
gap: 22px;
font-size: 15px;
border-bottom: 1px solid #EEEEEE;
}
.tab-bar span {
font-weight: 500;
color: #888888;
padding-bottom: 6px;
cursor: pointer;
position: relative;
}
.tab-bar span.active {
font-weight: 600;
color: #111111;
}
.tab-bar span.active::after {
content: '';
position: absolute;
bottom: 0;
left: 0;
width: 100%;
height: 2px;
background: #111;
}

/* 作品网格 */
.grid {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 12px;
padding: 16px 12px 40px;
}

/* Behance 卡片（只留标题） */
.card {
display: block;
text-decoration: none;
color: inherit;
cursor: pointer;
}
.card-img {
width: 100%;
aspect-ratio: 4/3;
object-fit: cover;
border-radius: 12px;
display: block;
}
.card-bottom {
padding: 8px 2px 0;
}
.card-title {
font-size: 14px;
font-weight: 600;
line-height: 1.2;
}

/* 弹出作品页 */
.popup {
position: fixed;
inset: 0;
background: #fff;
z-index: 999;
overflow-y: auto;
display: none;
}
.popup.show {
display: block;
}
.popup-head {
position: sticky;
top: 0;
background: #fff;
display: flex;
justify-content: space-between;
align-items: center;
padding: 16px 20px;
border-bottom: 1px solid #eee;
}
.popup-head .title {
font-size: 16px;
font-weight: 600;
}
.popup-close {
font-size: 22px;
padding: 0 8px;
cursor: pointer;
font-weight: 400;
}

/* 作品内容（这里我只把圆角改成 0，其他都没动！） */
.popup-body {
padding: 20px;
}
.popup-body .desc {
font-size: 15px;
line-height: 1.5;
color: #222;
margin-bottom: 24px;
}
.popup-body img {
width: 100%;
border-radius: 0;          /* 这里改成直角！ */
margin-bottom: 16px;
cursor: zoom-in;
}

/* 全屏看图 + 左右滑动 */
.zoom {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.95);
z-index: 1000;
display: none;
align-items: center;
justify-content: center;
}
.zoom.show {
display: flex;
}
.zoom img {
max-width: 96%;
max-height: 96vh;
object-fit: contain;
user-select: none;
}
</style>
</head>

<body>

<!-- 顶部名字 -->
<div class="top-name">大卫·霍克尼</div>

<!-- Tab -->
<div class="tab-bar">
<span class="active">作品</span>
<span>关于我</span>
<span>展览</span>
<span>联系方式</span>
</div>

<!-- 作品列表 -->
<div class="grid">
<div class="card" onclick="openWork(1)">
<img class="card-img" src="https://picsum.photos/id/10/600/450">
<div class="card-bottom">
<div class="card-title">泳池与阳光</div>
</div>
</div>

<div class="card" onclick="openWork(2)">
<img class="card-img" src="https://picsum.photos/id/11/600/450">
<div class="card-bottom">
<div class="card-title">山水拼贴</div>
</div>
</div>
</div>

<!-- 作品1 弹出页 -->
<div class="popup" id="work1">
<div class="popup-head">
<div class="title">泳池与阳光</div>
<div class="popup-close" onclick="closeWork()">×</div>
</div>
<div class="popup-body">
<p class="desc">大卫·霍克尼经典代表作，以高饱和色彩、平面化光影构成独特的加州风格。</p>
<img src="https://picsum.photos/id/10/800/600" onclick="openZoom(0, [
'https://picsum.photos/id/10/800/600',
'https://picsum.photos/id/13/800/600',
'https://picsum.photos/id/14/800/600'
])">
<img src="https://picsum.photos/id/13/800/600" onclick="openZoom(1, [
'https://picsum.photos/id/10/800/600',
'https://picsum.photos/id/13/800/600',
'https://picsum.photos/id/14/800/600'
])">
<img src="https://picsum.photos/id/14/800/600" onclick="openZoom(2, [
'https://picsum.photos/id/10/800/600',
'https://picsum.photos/id/13/800/600',
'https://picsum.photos/id/14/800/600'
])">
</div>
</div>

<!-- 作品2 弹出页 -->
<div class="popup" id="work2">
<div class="popup-head">
<div class="title">山水拼贴</div>
<div class="popup-close" onclick="closeWork()">×</div>
</div>
<div class="popup-body">
<p class="desc">霍克尼使用多段摄影拼贴，打破单一透视，呈现时间与空间的叠加。</p>
<img src="https://picsum.photos/id/11/800/600" onclick="openZoom(0, [
'https://picsum.photos/id/11/800/600'
])">
</div>
</div>

<!-- 全屏放大 -->
<div class="zoom" id="zoomLayer" onclick="closeZoom()">
<img id="zoomImg">
</div>

<script>
let currentPopup = null;
let zoomImages = [];
let currentZoomIndex = 0;

function openWork(n) {
closeWork();
currentPopup = document.getElementById('work'+n);
currentPopup.classList.add('show');
document.body.style.overflow = 'hidden';
}

function closeWork() {
if (currentPopup) {
currentPopup.classList.remove('show');
currentPopup = null;
}
document.body.style.overflow = 'auto';
closeZoom();
}

// 打开大图，并传入当前是第几张 + 全部图列表
function openZoom(index, list) {
currentZoomIndex = index;
zoomImages = list;
document.getElementById('zoomImg').src = zoomImages[currentZoomIndex];
document.getElementById('zoomLayer').classList.add('show');
}

function closeZoom() {
document.getElementById('zoomLayer').classList.remove('show');
}

// 左右滑动切换图片
let touchStartX = 0;
let touchEndX = 0;

document.getElementById('zoomLayer').addEventListener('touchstart', function(e) {
touchStartX = e.changedTouches[0].screenX;
});

document.getElementById('zoomLayer').addEventListener('touchend', function(e) {
touchEndX = e.changedTouches[0].screenX;
handleSwipe();
});

function handleSwipe() {
if (touchEndX < touchStartX - 50) {
// 向左滑 → 下一张
currentZoomIndex++;
if (currentZoomIndex >= zoomImages.length) currentZoomIndex = 0;
document.getElementById('zoomImg').src = zoomImages[currentZoomIndex];
}
if (touchEndX > touchStartX + 50) {
// 向右滑 → 上一张
currentZoomIndex--;
if (currentZoomIndex < 0) currentZoomIndex = zoomImages.length - 1;
document.getElementById('zoomImg').src = zoomImages[currentZoomIndex];
}
}
</script>

</body>
</html>
