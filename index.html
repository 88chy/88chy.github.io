<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大卫·霍克尼 | 作品集</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
background: #FFFFFF;
color: #111111;
}

/* 顶部名字 */
.top-name {
padding: 22px 20px 10px;
font-size: 24px;
font-weight: 700;
letter-spacing: -0.2px;
}

/* Tab 导航 */
.tab-bar {
display: flex;
padding: 0 20px 12px;
gap: 22px;
font-size: 15px;
border-bottom: 1px solid #EEEEEE;
}
.tab-bar span {
font-weight: 500;
color: #888888;
padding-bottom: 6px;
cursor: pointer;
position: relative;
}
.tab-bar span.active {
font-weight: 600;
color: #111111;
}
.tab-bar span.active::after {
content: '';
position: absolute;
bottom: 0;
left: 0;
width: 100%;
height: 2px;
background: #111;
}

/* 作品网格 */
.grid {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 12px;
padding: 16px 12px 40px;
}

/* Behance 卡片（只留标题） */
.card {
display: block;
text-decoration: none;
color: inherit;
cursor: pointer;
}
.card-img {
width: 100%;
aspect-ratio: 4/3;
object-fit: cover;
border-radius: 12px;
display: block;
}
.card-bottom {
padding: 8px 2px 0;
}
.card-title {
font-size: 14px;
font-weight: 600;
line-height: 1.2;
}

/* 弹出作品页 */
.popup {
position: fixed;
inset: 0;
background: #fff;
z-index: 999;
overflow-y: auto;
display: none;
}
.popup.show {
display: block;
}
.popup-head {
position: sticky;
top: 0;
background: #fff;
display: flex;
justify-content: space-between;
align-items: center;
padding: 16px 20px;
border-bottom: 1px solid #eee;
}
.popup-head .title {
font-size: 16px;
font-weight: 600;
}
.popup-close {
font-size: 22px;
padding: 0 8px;
cursor: pointer;
font-weight: 400;
}

/* 作品内容（去掉重复大标题） */
.popup-body {
padding: 20px;
}
.popup-body .desc {
font-size: 15px;
line-height: 1.5;
color: #222;
margin-bottom: 24px;
}
.popup-body img {
width: 100%;
border-radius: 10px;
margin-bottom: 16px;
cursor: zoom-in;
}

/* 全屏看图 */
.zoom {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.95);
z-index: 1000;
display: none;
align-items: center;
justify-content: center;
}
.zoom.show {
display: flex;
}
.zoom img {
max-width: 96%;
max-height: 96vh;
object-fit: contain;
}
</style>
</head>

<body>

<!-- 顶部名字 -->
<div class="top-name">大卫·霍克尼</div>

<!-- Tab -->
<div class="tab-bar">
<span class="active">作品</span>
<span>关于我</span>
<span>展览</span>
<span>联系方式</span>
</div>

<!-- 作品列表 -->
<div class="grid">
<div class="card" onclick="openWork(1)">
<img class="card-img" src="https://picsum.photos/id/10/600/450">
<div class="card-bottom">
<div class="card-title">泳池与阳光</div>
</div>
</div>

<div class="card" onclick="openWork(2)">
<img class="card-img" src="https://picsum.photos/id/11/600/450">
<div class="card-bottom">
<div class="card-title">山水拼贴</div>
</div>
</div>
</div>

<!-- 作品1 弹出页 -->
<div class="popup" id="work1">
<div class="popup-head">
<div class="title">泳池与阳光</div>
<div class="popup-close" onclick="closeWork()">×</div>
</div>
<div class="popup-body">
<p class="desc">大卫·霍克尼经典代表作，以高饱和色彩、平面化光影构成独特的加州风格。</p>
<img src="https://picsum.photos/id/10/800/600" onclick="openZoom(this.src)">
<img src="https://picsum.photos/id/13/800/600" onclick="openZoom(this.src)">
<img src="https://picsum.photos/id/14/800/600" onclick="openZoom(this.src)">
</div>
</div>

<!-- 作品2 弹出页 -->
<div class="popup" id="work2">
<div class="popup-head">
<div class="title">山水拼贴</div>
<div class="popup-close" onclick="closeWork()">×</div>
</div>
<div class="popup-body">
<p class="desc">霍克尼使用多段摄影拼贴，打破单一透视，呈现时间与空间的叠加。</p>
<img src="https://picsum.photos/id/11/800/600" onclick="openZoom(this.src)">
</div>
</div>

<!-- 全屏放大 -->
<div class="zoom" id="zoomLayer" onclick="closeZoom()">
<img id="zoomImg">
</div>

<script>
let current = null;
function openWork(n) {
closeWork();
current = document.getElementById('work'+n);
current.classList.add('show');
document.body.style.overflow = 'hidden';
}
function closeWork() {
if (current) {
current.classList.remove('show');
current = null;
}
document.body.style.overflow = 'auto';
closeZoom();
}
function openZoom(src) {
document.getElementById('zoomImg').src = src;
document.getElementById('zoomLayer').classList.add('show');
}
function closeZoom() {
document.getElementById('zoomLayer').classList.remove('show');
}
</script>

</body>
</html>
