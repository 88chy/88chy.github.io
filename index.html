<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      min-height: 100vh;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }

    /* 顶部栏：标题 + 汉堡/叉按钮（手机端） */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      padding: 0 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      border-bottom: 1px solid #eee;
      z-index: 100;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.02em;
      cursor: pointer; /* 标题添加点击指针 */
    }
    .header h1:hover {
      opacity: 0.8; /* hover效果 */
    }
    .menu-btn {
      width: 24px;
      height: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      position: relative;
    }
    .menu-btn span {
      width: 100%;
      height: 2px;
      background: #111;
      transition: all 0.3s ease;
    }
    .menu-btn.active span:nth-child(1) {
      transform: translateY(9px) rotate(45deg);
    }
    .menu-btn.active span:nth-child(2) {
      opacity: 0;
    }
    .menu-btn.active span:nth-child(3) {
      transform: translateY(-9px) rotate(-45deg);
    }

    /* 侧边菜单：从右侧滑出（手机端） */
    .sidebar {
      position: fixed;
      top: 0;
      right: -100%;
      width: 80%;
      max-width: 320px;
      height: 100vh;
      background: #fff;
      padding: 80px 40px 40px;
      overflow-y: auto;
      transition: right 0.3s ease;
      z-index: 99;
    }
    .sidebar.active {
      right: 0;
    }
    .sidebar h2 {
      display: none; /* 手机端不显示重复标题 */
    }
    .nav-category {
      font-size: 22px;
      font-weight: 500;
      margin: 30px 0 15px 0;
      color: #111;
    }
    .nav-item {
      font-size: 20px;
      color: #666;
      margin: 12px 0;
      cursor: pointer;
    }
    .nav-item.active,
    .nav-item:hover {
      color: #000;
      font-weight: 500;
    }

    /* 主内容：竖向大图（无边框） */
    .main {
      margin-top: 80px;
      padding: 30px 20px;
    }
    .work-group {
      display: none;
      flex-direction: column;
      gap: 40px;
    }
    .work-group.active {
      display: flex;
    }
    .work-item {
      width: 100%;
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }
    .work-item.active {
      opacity: 1;
      transform: translateY(0);
    }
    .work-img {
      width: 100%;
      height: auto;
    }

    /* 电脑端：左右分栏 */
    @media (min-width: 769px) {
      .header {
        display: none;
      }
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        right: auto;
        width: 260px;
        height: 100vh;
        padding: 60px 45px;
        border-right: 1px solid #eee;
        transition: none;
      }
      .sidebar h2 {
        display: block;
        font-size: 26px;
        font-weight: 500;
        margin-bottom: 50px;
        letter-spacing: -0.02em;
        cursor: pointer; /* 电脑端侧边标题也添加点击 */
      }
      .sidebar h2:hover {
        opacity: 0.8;
      }
      .nav-category {
        font-size: 14px;
        margin: 35px 0 12px 0;
      }
      .nav-item {
        font-size: 14px;
      }
      .main {
        margin-top: 0;
        margin-left: 260px;
        height: 100vh;
        padding: 0 40px;
        display: flex;
        align-items: center;
        overflow-x: auto;
        overflow-y: hidden;
      }
      .work-group {
        flex-direction: row;
        height: 100%;
        align-items: center;
      }
      .work-item {
        height: 75vh;
        width: auto;
      }
      .work-img {
        height: 100%;
        width: auto;
      }
    }

    /* 主页占位样式 */
    .home-placeholder {
      width: 100%;
      height: 75vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 18px;
    }

    /* 我只加了这一段：作品文字样式 */
    .work-text {
      font-size: 15px;
      line-height: 1.8;
      color: #111;
      max-width: 600px;
      margin: 20px 0;
    }
    .work-title {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .work-date {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<!-- 手机端顶部栏 -->
<div class="header">
  <h1 id="headerTitle">510521199509080024</h1>
  <div class="menu-btn" id="menuBtn">
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<!-- 侧边菜单 -->
<div class="sidebar" id="sidebar">
  <h2 id="sidebarTitle">510521199509080024</h2>

  <div class="nav-category">(2018—2026)</div>
  <div class="nav-item" data-target="work-1">三个关于水的故事</div>
  <div class="nav-item" data-target="work-2">模仿爸爸</div>
  <div class="nav-item" data-target="work-3">佛手</div>
  <div class="nav-item" data-target="work-4">有没有</div>
  <div class="nav-item" data-target="work-5">人体写生</div>
  <div class="nav-item" data-target="work-6">城市里的狗</div>
  <div class="nav-item" data-target="work-7">好朋友</div>
  <div class="nav-item" data-target="work-8">你怎么了，给妈妈说说</div>

  <div class="nav-category">关于</div>
  <div class="nav-item" data-target="about">陈红羽</div>
</div>

<!-- 主内容区 -->
<div class="main">
  <!-- 主页（默认显示） -->
  <div class="work-group active" id="home">
    <div class="work-item active">
      <div class="home-placeholder">
        点击菜单查看作品
      </div>
    </div>
  </div>

  <!-- 作品区域 -->
  <div class="work-group" id="work-1">
    <div class="work-item active">
      <img src="" class="work-img">
    </div>
  </div>
  <div class="work-group" id="work-2">
    <div class="work-item active">
      <img src="" class="work-img">
    </div>
  </div>

  <!-- 我只改了这里：佛手内容 -->
  <div class="work-group" id="work-3">
    <div class="work-item active" style="height:auto; width:100%;">
      <div class="work-title">佛手</div>
      <div class="work-date">2023年11月10日</div>
      <img src="https://raw.githubusercontent.com/88chy/88chy.github.io/main/cfdb5e88fq969da8fce7ac11123531a7.jpeg" class="work-img">
      <div class="work-text">

2008年，我跟表叔一家人过年去了泸县玉蟾山寺庙，有个和尚过来说教我正确的拜佛姿势，带我走到大殿后方，面对一尊佛像，他站到身后，双手放于我胸上。<br>

    </div>
  </div>

  <div class="work-group" id="work-4">
    <div class="work-item active">
      <img src="" class="work-img">
    </div>
  </div>
  <div class="work-group" id="work-5">
    <div class="work-item active">
      <img src="" class="work-img">
    </div>
  </div>
  <div class="work-group" id="work-6">
    <div class="work-item active">
      <img src="" class="work-img">
    </div>
  </div>
  <div class="work-group" id="work-7">
    <div class="work-item active">
      <img src="" class="work-img">
    </div>
  </div>
  <div class="work-group" id="work-8">
    <div class="work-item active">
      <img src="" class="work-img">
    </div>
  </div>
  <div class="work-group" id="about">
    <div class="work-item active" style="height:auto;">
      <div style="font-size:15px; line-height:1.8;">
        陈红羽的个人介绍内容<br>
        可以在这里补充具体信息<br><br>
        © 510521199509080024
      </div>
    </div>
  </div>
</div>

<script>
  const menuBtn = document.getElementById('menuBtn');
  const sidebar = document.getElementById('sidebar');
  const navItems = document.querySelectorAll('.nav-item');
  const workGroups = document.querySelectorAll('.work-group');
  const headerTitle = document.getElementById('headerTitle');
  const sidebarTitle = document.getElementById('sidebarTitle');

  // 汉堡按钮切换菜单
  menuBtn.addEventListener('click', () => {
    menuBtn.classList.toggle('active');
    sidebar.classList.toggle('active');
  });

  // 点击菜单外区域收起菜单
  document.addEventListener('click', (e) => {
    if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
      menuBtn.classList.remove('active');
      sidebar.classList.remove('active');
    }
  });

  // 菜单点击切换作品
  navItems.forEach(item => {
    item.addEventListener('click', () => {
      const target = item.dataset.target;
      workGroups.forEach(g => g.classList.remove('active'));
      document.getElementById(target).classList.add('active');
      navItems.forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      menuBtn.classList.remove('active');
      sidebar.classList.remove('active');
    });
  });

  // 顶部标题点击返回主页
  headerTitle.addEventListener('click', () => {
    workGroups.forEach(g => g.classList.remove('active'));
    document.getElementById('home').classList.add('active');
    navItems.forEach(i => i.classList.remove('active'));
    sidebar.classList.remove('active');
    menuBtn.classList.remove('active');
  });

  // 电脑端侧边标题点击返回主页
  sidebarTitle.addEventListener('click', () => {
    workGroups.forEach(g => g.classList.remove('active'));
    document.getElementById('home').classList.add('active');
    navItems.forEach(i => i.classList.remove('active'));
  });

  // 图片淡入动画
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => e.isIntersecting && e.target.classList.add('active'));
  }, { threshold: 0.1 });
  document.querySelectorAll('.work-item').forEach(i => observer.observe(i));
</script>
</body>
</html>
