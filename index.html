<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大卫·霍克尼 | 作品集</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
background: #FFFFFF;
color: #111111;
}

/* 缓慢出现动画（修复白块：图片加载完成再触发） */
.fade-in {
opacity: 0;
transform: translateY(10px);
transition: opacity 0.5s ease-out, transform 0.5s ease-out;
}
.fade-in.show {
opacity: 1;
transform: translateY(0);
}

/* 图片加载占位背景，避免白块 */
.popup-body img {
background: #f5f5f5;
min-height: 200px;
}

.top-name {
padding: 22px 20px 10px;
font-size: 24px;
font-weight: 700;
letter-spacing: -0.2px;
}

.tab-bar {
display: flex;
padding: 0 20px 12px;
gap: 22px;
font-size: 15px;
border-bottom: 1px solid #EEEEEE;
}
.tab-bar span {
font-weight: 500;
color: #888888;
padding-bottom: 6px;
cursor: pointer;
position: relative;
}
.tab-bar span.active {
font-weight: 600;
color: #111111;
}
.tab-bar span.active::after {
content: '';
position: absolute;
bottom: 0;
left: 0;
width: 100%;
height: 2px;
background: #111;
}

.grid {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 12px;
padding: 16px 12px 40px;
}

.card {
display: block;
text-decoration: none;
color: inherit;
cursor: pointer;
}
.card-img {
width: 100%;
aspect-ratio: 4/3;
object-fit: cover;
border-radius: 12px;
display: block;
background: #f5f5f5;
}
.card-bottom {
padding: 8px 2px 0;
}
.card-title {
font-size: 14px;
font-weight: 600;
line-height: 1.2;
}

.popup {
position: fixed;
inset: 0;
background: #fff;
z-index: 999;
overflow-y: auto;
display: none;
}
.popup.show {
display: block;
}
.popup-head {
position: sticky;
top: 0;
background: #fff;
display: flex;
justify-content: space-between;
align-items: center;
padding: 16px 20px;
border-bottom: 1px solid #eee;
}
.popup-head .title {
font-size: 16px;
font-weight: 600;
}
.popup-close {
font-size: 22px;
padding: 0 8px;
cursor: pointer;
font-weight: 400;
}

.popup-body {
padding: 20px;
}
.popup-body .desc {
font-size: 15px;
line-height: 1.5;
color: #222;
margin-bottom: 24px;
}
.popup-body img {
width: 100%;
border-radius: 0;
margin-bottom: 16px;
cursor: zoom-in;
}

/* 全屏看图容器（支持平滑拖动） */
.zoom {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.95);
z-index: 1000;
display: none;
overflow: hidden;
}
.zoom.show {
display: flex;
}
.zoom-wrap {
display: flex;
height: 100%;
transition: transform 0.3s ease-out;
}
.zoom-item {
width: 100vw;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
background: #000;
}
.zoom-item img {
max-width: 96%;
max-height: 96vh;
object-fit: contain;
user-select: none;
opacity: 0;
transition: opacity 0.2s ease-out;
}
.zoom-item img.loaded {
opacity: 1;
}
</style>
</head>

<body>

<div class="top-name">大卫·霍克尼</div>

<div class="tab-bar">
<span class="active">作品</span>
<span>关于我</span>
<span>展览</span>
<span>联系方式</span>
</div>

<div class="grid">
<div class="card fade-in" onclick="openWork(1)">
<img class="card-img" src="https://picsum.photos/id/10/600/450">
<div class="card-bottom">
<div class="card-title">泳池与阳光</div>
</div>
</div>

<div class="card fade-in" onclick="openWork(2)">
<img class="card-img" src="https://picsum.photos/id/11/600/450">
<div class="card-bottom">
<div class="card-title">山水拼贴</div>
</div>
</div>
</div>

<div class="popup" id="work1">
<div class="popup-head">
<div class="title">泳池与阳光</div>
<div class="popup-close" onclick="closeWork()">×</div>
</div>
<div class="popup-body">
<p class="desc fade-in">大卫·霍克尼经典代表作，以高饱和色彩、平面化光影构成独特的加州风格。</p>
<img class="fade-in" src="https://picsum.photos/id/10/800/600" onclick="openZoom([
'https://picsum.photos/id/10/800/600',
'https://picsum.photos/id/13/800/600',
'https://picsum.photos/id/14/800/600'
], 0)">
<img class="fade-in" src="https://picsum.photos/id/13/800/600" onclick="openZoom([
'https://picsum.photos/id/10/800/600',
'https://picsum.photos/id/13/800/600',
'https://picsum.photos/id/14/800/600'
], 1)">
<img class="fade-in" src="https://picsum.photos/id/14/800/600" onclick="openZoom([
'https://picsum.photos/id/10/800/600',
'https://picsum.photos/id/13/800/600',
'https://picsum.photos/id/14/800/600'
], 2)">
</div>
</div>

<div class="popup" id="work2">
<div class="popup-head">
<div class="title">山水拼贴</div>
<div class="popup-close" onclick="closeWork()">×</div>
</div>
<div class="popup-body">
<p class="desc fade-in">霍克尼使用多段摄影拼贴，打破单一透视，呈现时间与空间的叠加。</p>
<img class="fade-in" src="https://picsum.photos/id/11/800/600" onclick="openZoom([
'https://picsum.photos/id/11/800/600'
], 0)">
</div>
</div>

<div class="zoom" id="zoomLayer">
  <div class="zoom-wrap" id="zoomWrap"></div>
</div>

<script>
let currentPopup = null;
let zoomList = [];
let currentIdx = 0;
let startX = 0;
let offsetX = 0;
let isDragging = false;

// 缓慢出现监听（修复白块：图片加载完成再触发淡入）
function watchFade() {
  const els = document.querySelectorAll('.fade-in');
  const ob = new IntersectionObserver(es => {
    es.forEach(e => {
      if (e.isIntersecting) {
        // 如果是图片，等加载完成再显示
        if (e.target.tagName === 'IMG') {
          if (e.target.complete) {
            e.target.classList.add('show');
          } else {
            e.target.onload = () => e.target.classList.add('show');
          }
        } else {
          e.target.classList.add('show');
        }
      }
    });
  }, { threshold: 0.1 });
  els.forEach(i => ob.observe(i));
}

window.addEventListener('DOMContentLoaded', watchFade);

function openWork(n) {
  closeWork();
  currentPopup = document.getElementById('work'+n);
  currentPopup.classList.add('show');
  document.body.style.overflow = 'hidden';
  setTimeout(watchFade, 100);
}

function closeWork() {
  if (currentPopup) {
    currentPopup.classList.remove('show');
    currentPopup = null;
  }
  document.body.style.overflow = 'auto';
  closeZoom();
}

// 打开全屏图集（修复白块：图片加载完成再显示）
function openZoom(images, startIndex) {
  currentIdx = startIndex;
  zoomList = images;
  const wrap = document.getElementById('zoomWrap');
  wrap.innerHTML = '';

  images.forEach((src, index) => {
    const item = document.createElement('div');
    item.className = 'zoom-item';
    const img = document.createElement('img');
    img.src = src;
    // 图片加载完成再淡入，彻底消除白块
    img.onload = () => img.classList.add('loaded');
    item.appendChild(img);
    wrap.appendChild(item);
  });

  wrap.style.transform = `translateX(-${currentIdx * 100}vw)`;
  document.getElementById('zoomLayer').classList.add('show');
}

function closeZoom() {
  document.getElementById('zoomLayer').classList.remove('show');
}

const wrap = document.getElementById('zoomWrap');

wrap.addEventListener('touchstart', e => {
  isDragging = true;
  startX = e.touches[0].clientX;
  offsetX = 0;
  wrap.style.transition = 'none';
});

wrap.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const x = e.touches[0].clientX;
  offsetX = x - startX;
  const move = -currentIdx * window.innerWidth + offsetX;
  wrap.style.transform = `translateX(${move}px)`;
});

wrap.addEventListener('touchend', () => {
  isDragging = false;
  const w = window.innerWidth;
  const threshold = w * 0.2;

  if (offsetX < -threshold) {
    currentIdx = Math.min(currentIdx + 1, zoomList.length - 1);
  } else if (offsetX > threshold) {
    currentIdx = Math.max(currentIdx - 1, 0);
  }

  wrap.style.transition = 'transform 0.3s ease-out';
  wrap.style.transform = `translateX(-${currentIdx * w}px)`;
});

document.getElementById('zoomLayer').addEventListener('click', closeZoom);
</script>

</body>
</html>
