<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陈红羽 | 作品集2017-2026</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
body {
  background: #fff;
  color: #111;
  padding-bottom: 60px;
}
/* 滚动渐入 */
.fade-in {
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.5s ease-out, transform 0.5s ease-out;
}
.fade-in.show {
  opacity: 1;
  transform: translateY(0);
}
/* 页面切换淡入 */
.page-wrap{display:none;opacity:0;transition:0.4s ease all;}
.page-wrap.active{display:block;opacity:1;}

/* 顶部名字可点击返回首页 */
.top-name {
  padding: 28px 24px 12px;
  font-size: 24px;
  font-weight: 700;
  cursor: pointer;
}
/* Tab导航 */
.tab-bar {
  display: flex;
  gap: 26px;
  padding: 0 24px 16px;
  border-bottom: 1px solid #eee;
  font-size: 15px;
}
.tab-bar span {
  font-weight: 500;
  color: #888;
  padding-bottom: 6px;
  cursor: pointer;
  position: relative;
  white-space: nowrap;
}
.tab-bar span.active {
  font-weight: 600;
  color: #111;
}
.tab-bar span.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: #111;
}
.tab-content{display:none;padding:28px 24px;}
.tab-content.active{display:block;}

/* 作品网格 */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
  padding: 28px 24px;
}

/* ========== Behance风格卡片重构 ========== */
.card {
  display: block;
  text-decoration: none;
  color: inherit;
  cursor: pointer;
  background:#fff;
  border-radius:12px;
  padding:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.card:hover {
  transform: translateY(-4px) scale(1.01);
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}
.card-img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
  border-radius: 8px;
  background: #f7f7f7;
}
/* 标题区加大留白，隔离图文，不拥挤 */
.card-bottom {
  padding-top: 14px;
  padding-bottom:6px;
}
.card-title {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.4;
  color:#222;
}

/* 详情页 */
.work-detail{
  padding:40px 24px;
  max-width:900px;
  margin:0 auto;
}
.back-btn{
  cursor:pointer;
  margin-bottom:30px;
  font-size:16px;
  color:#333;
}

/* 移动端单列 */
@media (max-width:768px){
  .grid{grid-template-columns:1fr;padding:20px 16px;gap:20px;}
  .top-name{padding:20px 16px 8px;font-size:20px;}
  .tab-bar{padding:0 16px 12px;gap:16px;}
  .card{padding:10px;}
}
</style>
</head>
<body>

<!-- 名字点击返回首页 -->
<div class="top-name" onclick="backHome()">陈红羽</div>

<div class="tab-bar">
  <span class="active" data-tab="work">作品2017-2026</span>
  <span data-tab="about">关于</span>
  <span data-tab="exhibition">展览</span>
  <span data-tab="contact">联系方式</span>
</div>

<div class="tab-content active" id="work-tab">
  <div class="grid">
    <div class="card fade-in" onclick="openWork(1)">
      <!-- 第一张图如果打不开：把字贴改成字帖即可 -->
      <img class="card-img" src="images/字贴.jpeg">
      <!-- <img class="card-img" src="images/字帖.jpeg"> -->
      <div class="card-bottom"><div class="card-title">写字在贴纸上</div></div>
    </div>
    <div class="card fade-in" onclick="openWork(2)">
      <img class="card-img" src="images/回音直播.jpeg">
      <div class="card-bottom"><div class="card-title">回音直播</div></div>
    </div>
    <div class="card fade-in" onclick="openWork(3)">
      <img class="card-img" src="images/回音.jpeg">
      <div class="card-bottom"><div class="card-title">回音</div></div>
    </div>
    <div class="card fade-in" onclick="openWork(4)">
      <img class="card-img" src="images/佛手.jpg">
      <div class="card-bottom"><div class="card-title">佛手</div></div>
    </div>
    <div class="card fade-in" onclick="openWork(5)">
      <img class="card-img" src="images/交易.jpeg">
      <div class="card-bottom"><div class="card-title">交易</div></div>
    </div>
    <div class="card fade-in" onclick="openWork(6)">
      <img class="card-img" src="images/你怎么了.jpeg">
      <div class="card-bottom"><div class="card-title">你怎么了，给妈妈说说</div></div>
    </div>
    <div class="card fade-in" onclick="openWork(7)">
      <img class="card-img" src="images/城市里的狗.jpeg">
      <div class="card-bottom"><div class="card-title">城市里的狗</div></div>
    </div>
    <div class="card fade-in" onclick="openWork(8)">
      <img class="card-img" src="images/好朋友.jpeg">
      <div class="card-bottom"><div class="card-title">好朋友</div></div>
    </div>
    <div class="card fade-in" onclick="openWork(9)">
      <img class="card-img" src="images/深圳上班.jpeg">
      <div class="card-bottom"><div class="card-title">毕业之后在深圳上班</div></div>
    </div>
  </div>
</div>

<!-- 内部全部删掉重复标题，页面干净无冗余 -->
<div class="tab-content" id="about-tab">
  <p>这里填写个人简介、创作理念、经历。</p>
</div>
<div class="tab-content" id="exhibition-tab">
  <p>这里填写参展、获奖、项目履历。</p>
</div>
<div class="tab-content" id="contact-tab">
  <p>邮箱 / 社交链接 / 联络方式</p>
</div>

<div id="work-detail" class="page-wrap">
  <div class="work-detail">
    <div class="back-btn" onclick="backHome()">← 返回作品列表</div>
    <h2 id="detail-title" style="margin-bottom:20px;"></h2>
    <div id="detail-content"></div>
  </div>
</div>

<script>
// Tab切换
const tabs = document.querySelectorAll('.tab-bar span');
tabs.forEach(item=>{
  item.onclick = function(){
    tabs.forEach(i=>i.classList.remove('active'));
    this.classList.add('active');
    let id = this.getAttribute('data-tab');
    document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
    document.getElementById(id+'-tab').classList.add('active');
  }
})

const workList = [
  {title:"写字在贴纸上"},
  {title:"回音直播"},
  {title:"回音"},
  {title:"佛手"},
  {title:"交易"},
  {title:"你怎么了，给妈妈说说"},
  {title:"城市里的狗"},
  {title:"好朋友"},
  {title:"毕业之后在深圳上班"}
];

function openWork(num){
  let idx = num-1;
  document.getElementById('detail-title').innerText = workList[idx].title;
  document.getElementById('work-tab').classList.remove('active');
  document.getElementById('work-detail').classList.add('active');
}
function backHome(){
  document.getElementById('work-detail').classList.remove('active');
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelector('[data-tab="work"]').classList.add('active');
  document.getElementById('work-tab').classList.add('active');
}

// 滚动渐入
const els = document.querySelectorAll('.fade-in');
const ob = new IntersectionObserver(es => {
  es.forEach(e => e.isIntersecting && e.target.classList.add('show'));
},{ threshold: 0.1 });
els.forEach(el=>ob.observe(el));
</script>
</body>
</html>
