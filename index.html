<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陈红羽 | 作品集2017-2026</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
body {
  background: #fff;
  color: #111;
  padding-bottom: 60px;
}
.fade-in {
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.5s ease-out, transform 0.5s ease-out;
}
.fade-in.show {
  opacity: 1;
  transform: translateY(0);
}
.top-name {
  padding: 28px 24px 12px;
  font-size: 24px;
  font-weight: 700;
}
.tab-bar {
  display: flex;
  gap: 26px;
  padding: 0 24px 16px;
  border-bottom: 1px solid #eee;
  font-size: 15px;
}
.tab-bar span {
  font-weight: 500;
  color: #888;
  padding-bottom: 6px;
  cursor: pointer;
  position: relative;
  white-space: nowrap;
}
.tab-bar span.active {
  font-weight: 600;
  color: #111;
}
.tab-bar span.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: #111;
}
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
  padding: 28px 24px;
}
.card {
  display: block;
  text-decoration: none;
  color: inherit;
  cursor: pointer;
}
.card-img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
  border-radius: 12px;
  background: #f7f7f7;
}
.card-bottom {
  padding-top: 10px;
}
.card-title {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.3;
}
.popup {
  position: fixed;
  inset: 0;
  background: #fff;
  z-index: 999;
  overflow-y: auto;
  display: none;
}
.popup.show {
  display: block;
}
.popup-head {
  position: sticky;
  top: 0;
  background: #fff;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px;
  border-bottom: 1px solid #eee;
}
.popup-head .title {
  font-size: 16px;
  font-weight: 600;
}
.popup-close {
  font-size: 22px;
  cursor: pointer;
}
.popup-body img {
  width: 100%;
  display: block;
}
</style>
</head>
<body>

<div class="top-name">陈红羽</div>
<div class="tab-bar">
  <span class="active">作品2017-2026</span>
  <span>关于</span>
  <span>展览</span>
  <span>联系方式</span>
</div>

<div class="grid">
  <div class="card fade-in" onclick="openWork(1)">
    <img class="card-img" src="字贴.jpg">
    <div class="card-bottom"><div class="card-title">写字在贴纸上</div></div>
  </div>
  <div class="card fade-in" onclick="openWork(2)">
    <img class="card-img" src="回音直播.jpg">
    <div class="card-bottom"><div class="card-title">回音直播</div></div>
  </div>
  <div class="card fade-in" onclick="openWork(3)">
    <img class="card-img" src="回音.jpg">
    <div class="card-bottom"><div class="card-title">回音</div></div>
  </div>
  <div class="card fade-in" onclick="openWork(4)">
    <img class="card-img" src="佛手.jpg">
    <div class="card-bottom"><div class="card-title">佛手</div></div>
  </div>
  <div class="card fade-in" onclick="openWork(5)">
    <img class="card-img" src="交易.jpg">
    <div class="card-bottom"><div class="card-title">交易</div></div>
  </div>
  <div class="card fade-in" onclick="openWork(6)">
    <img class="card-img" src="你怎么了.jpg">
    <div class="card-bottom"><div class="card-title">你怎么了，给妈妈说说</div></div>
  </div>
  <div class="card fade-in" onclick="openWork(7)">
    <img class="card-img" src="城市里的狗.jpg">
    <div class="card-bottom"><div class="card-title">城市里的狗</div></div>
  </div>
  <div class="card fade-in" onclick="openWork(8)">
    <img class="card-img" src="好朋友.jpg">
    <div class="card-bottom"><div class="card-title">好朋友</div></div>
  </div>
  <div class="card fade-in" onclick="openWork(9)">
    <img class="card-img" src="深圳上班.jpg">
    <div class="card-bottom"><div class="card-title">毕业之后在深圳上班</div></div>
  </div>
</div>

<div class="popup" id="work1"><div class="popup-head"><div class="title">写字在贴纸上</div><div class="popup-close" onclick="closeWork()">×</div></div><div class="popup-body"></div></div>
<div class="popup" id="work2"><div class="popup-head"><div class="title">回音直播</div><div class="popup-close" onclick="closeWork()">×</div></div><div class="popup-body"></div></div>
<div class="popup" id="work3"><div class="popup-head"><div class="title">回音</div><div class="popup-close" onclick="closeWork()">×</div></div><div class="popup-body"></div></div>
<div class="popup" id="work4"><div class="popup-head"><div class="title">佛手</div><div class="popup-close" onclick="closeWork()">×</div></div><div class="popup-body"></div></div>
<div class="popup" id="work5"><div class="popup-head"><div class="title">交易</div><div class="popup-close" onclick="closeWork()">×</div></div><div class="popup-body"></div></div>
<div class="popup" id="work6"><div class="popup-head"><div class="title">你怎么了，给妈妈说说</div><div class="popup-close" onclick="closeWork()">×</div></div><div class="popup-body"></div></div>
<div class="popup" id="work7"><div class="popup-head"><div class="title">城市里的狗</div><div class="popup-close" onclick="closeWork()">×</div></div><div class="popup-body"></div></div>
<div class="popup" id="work8"><div class="popup-head"><div class="title">好朋友</div><div class="popup-close" onclick="closeWork()">×</div></div><div class="popup-body"></div></div>
<div class="popup" id="work9"><div class="popup-head"><div class="title">毕业之后在深圳上班</div><div class="popup-close" onclick="closeWork()">×</div></div><div class="popup-body"></div></div>

<script>
let current = null;
function openWork(n) {
  closeWork();
  current = document.getElementById('work'+n);
  current.classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeWork() {
  if (current) current.classList.remove('show');
  current = null;
  document.body.style.overflow = 'auto';
}
const els = document.querySelectorAll('.fade-in');
const ob = new IntersectionObserver(es => {
  es.forEach(e => e.isIntersecting && e.target.classList.add('show'));
}, { threshold: 0.1 });
els.forEach(el => ob.observe(el));
</script>
</body>
</html>
