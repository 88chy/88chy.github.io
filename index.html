<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    /* 原有样式保持不变，新增标题点击样式 */
    .title-clickable {
      cursor: pointer;
    }
    .title-clickable:hover {
      opacity: 0.8; /* 点击时轻微效果 */
    }
    /* 其他原有样式... */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      min-height: 100vh;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      padding: 0 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      border-bottom: 1px solid #eee;
      z-index: 100;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }
    .menu-btn {
      width: 24px;
      height: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      position: relative;
    }
    .menu-btn span {
      width: 100%;
      height: 2px;
      background: #111;
      transition: all 0.3s ease;
    }
    .menu-btn.active span:nth-child(1) {
      transform: translateY(9px) rotate(45deg);
    }
    .menu-btn.active span:nth-child(2) {
      opacity: 0;
    }
    .menu-btn.active span:nth-child(3) {
      transform: translateY(-9px) rotate(-45deg);
    }

    .sidebar {
      position: fixed;
      top: 0;
      right: -100%;
      width: 80%;
      max-width: 320px;
      height: 100vh;
      background: #fff;
      padding: 80px 40px 40px;
      overflow-y: auto;
      transition: right 0.3s ease;
      z-index: 99;
    }
    .sidebar.active {
      right: 0;
    }
    .sidebar h2 {
      display: none;
    }
    .nav-category {
      font-size: 22px;
      font-weight: 500;
      margin: 30px 0 15px 0;
      color: #111;
    }
    .nav-item {
      font-size: 20px;
      color: #666;
      margin: 12px 0;
      cursor: pointer;
    }
    .nav-item.active,
    .nav-item:hover {
      color: #000;
      font-weight: 500;
    }

    .main {
      margin-top: 80px;
      padding: 30px 20px;
    }
    .work-group {
      display: none;
      flex-direction: column;
      gap: 40px;
    }
    .work-group.active {
      display: flex;
    }
    .work-item {
      width: 100%;
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }
    .work-item.active {
      opacity: 1;
      transform: translateY(0);
    }
    .work-img {
      width: 100%;
      height: auto;
    }

    @media (min-width: 769px) {
      .header {
        display: none;
      }
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        right: auto;
        width: 260px;
        height: 100vh;
        padding: 60px 45px;
        border-right: 1px solid #eee;
        transition: none;
      }
      .sidebar h2 {
        display: block;
        font-size: 26px;
        font-weight: 500;
        margin-bottom: 50px;
        letter-spacing: -0.02em;
      }
      .nav-category {
        font-size: 14px;
        margin: 35px 0 12px 0;
      }
      .nav-item {
        font-size: 14px;
      }
      .main {
        margin-top: 0;
        margin-left: 260px;
        height: 100vh;
        padding: 0 40px;
        display: flex;
        align-items: center;
        overflow-x: auto;
        overflow-y: hidden;
      }
      .work-group {
        flex-direction: row;
        height: 100%;
        align-items: center;
      }
      .work-item {
        height: 75vh;
        width: auto;
      }
      .work-img {
        height: 100%;
        width: auto;
      }
    }

    .home-placeholder {
      width: 100%;
      height: 75vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 18px;
    }
  </style>
</head>
