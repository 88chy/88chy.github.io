<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>510521199509080024</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      min-height: 100vh;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }

    /* 顶部标题栏（点击展开菜单） */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px 25px;
      background: #fff;
      z-index: 100;
      cursor: pointer;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    /* 下拉菜单（默认收起，点击标题才滑出） */
    .menu {
      position: fixed;
      top: -100%; /* 默认藏在屏幕外 */
      left: 0;
      right: 0;
      background: #fff;
      padding: 80px 25px 40px;
      border-bottom: 1px solid #eee;
      transition: top 0.3s ease;
      z-index: 99;
    }
    .menu.active {
      top: 0; /* 点击标题后滑出 */
    }
    .menu h2 {
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 30px;
      letter-spacing: -0.02em;
    }
    .nav-category {
      font-size: 18px;
      font-weight: 500;
      margin: 25px 0 10px 0;
      color: #111;
    }
    .nav-item {
      font-size: 16px;
      color: #666;
      margin: 8px 0;
      cursor: pointer;
    }
    .nav-item.active,
    .nav-item:hover {
      color: #000;
      font-weight: 500;
    }

    /* 主内容：竖向大图（彻底无边框） */
    .main {
      margin-top: 80px; /* 只给顶部标题留空间，菜单默认不占位置 */
      padding: 0 20px 40px;
    }
    .work-group {
      display: none;
      flex-direction: column;
      gap: 30px;
    }
    .work-group.active {
      display: flex;
    }
    .work-item {
      width: 100%;
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }
    .work-item.active {
      opacity: 1;
      transform: translateY(0);
    }
    .work-img {
      width: 100%;
      height: auto;
      /* 彻底无边框：无任何 border 代码 */
    }

    /* 电脑端：左右分栏 */
    @media (min-width: 769px) {
      .header {
        display: none;
      }
      .menu {
        position: fixed;
        top: 0;
        left: 0;
        width: 260px;
        height: 100vh;
        padding: 60px 45px;
        border-right: 1px solid #eee;
        border-bottom: none;
        transition: none;
      }
      .menu h2 {
        font-size: 26px;
        margin-bottom: 50px;
      }
      .nav-category {
        font-size: 14px;
        margin: 35px 0 12px 0;
      }
      .nav-item {
        font-size: 14px;
      }
      .main {
        margin-top: 0;
        margin-left: 260px;
        height: 100vh;
        padding: 0 40px;
        display: flex;
        align-items: center;
        overflow-x: auto;
        overflow-y: hidden;
      }
      .work-group {
        flex-direction: row;
        height: 100%;
        align-items: center;
      }
      .work-item {
        height: 75vh;
        width: auto;
      }
      .work-img {
        height: 100%;
        width: auto;
      }
    }
  </style>
</head>
<body>

<!-- 顶部标题（点击展开菜单） -->
<div class="header" id="header">
  <h1>510521199509080024</h1>
</div>

<!-- 下拉菜单（手机端默认收起） -->
<div class="menu" id="menu">
  <h2>510521199509080024</h2>

  <div class="nav-category">好朋友</div>
  <div class="nav-item active" data-target="friend">好朋友</div>

  <div class="nav-category">交易</div>
  <div class="nav-item" data-target="trade">交易</div>

  <div class="nav-category">回音</div>
  <div class="nav-item" data-target="echo">回音</div>

  <div class="nav-category">About</div>
  <div class="nav-item" data-target="about">About</div>
</div>

<!-- 主内容区 -->
<div class="main">
  <div class="work-group active" id="friend">
    <div class="work-item active">
      <img src="https://mmbiz.qpic.cn/mmbiz_jpg/ZisNqcfUDZB9d8FmTVkNQ0U9G0tX9Q8iaia4Xt0s8iaic0iaic0iaic0iaic0iaic0iaic0iaic0iaic0iaic/640?wx_fmt=jpeg" class="work-img">
    </div>
  </div>

  <div class="work-group" id="trade">
    <div class="work-item active">
      <img src="cover-2.jpg" class="work-img">
    </div>
  </div>

  <div class="work-group" id="echo">
    <div class="work-item active">
      <img src="cover-3.jpg" class="work-img">
    </div>
  </div>

  <div class="work-group" id="about" style="display:none;">
    <div class="work-item active" style="height:auto;">
      <div style="font-size:15px; line-height:1.8; color:#333;">
        Visual & performance art practice.<br>
        Body, identity, space.<br><br>
        © 510521199509080024
      </div>
    </div>
  </div>
</div>

<script>
  // 菜单展开/收起
  const header = document.getElementById('header');
  const menu = document.getElementById('menu');

  header.addEventListener('click', () => {
    menu.classList.toggle('active');
  });

  // 点击菜单外区域收起菜单
  document.addEventListener('click', (e) => {
    if (!menu.contains(e.target) && !header.contains(e.target)) {
      menu.classList.remove('active');
    }
  });

  // 作品切换 + 切换后自动收起菜单
  const navItems = document.querySelectorAll('.nav-item');
  const workGroups = document.querySelectorAll('.work-group');

  navItems.forEach(item => {
    item.addEventListener('click', () => {
      const target = item.dataset.target;
      workGroups.forEach(g => g.classList.remove('active'));
      document.getElementById(target).classList.add('active');
      navItems.forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      menu.classList.remove('active'); // 点击作品后自动收起菜单
    });
  });

  // 图片淡入动画
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => e.isIntersecting && e.target.classList.add('active'));
  }, { threshold: 0.1 });
  document.querySelectorAll('.work-item').forEach(i => observer.observe(i));
</script>

</body>
</html>
